name: Docker Publish And Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  # Registry host without protocol (for example: registry.9kfun.xyz)
  REGISTRY: registry.9kfun.xyz
  # Full repository path in registry (for example: myproject/walle)
  IMAGE_REPOSITORY: walle_app

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Prepare image metadata
        id: vars
        run: |
          set -euo pipefail
          COMMIT_ID="${GITHUB_SHA::7}"
          DATE_TAG="$(date -u +%Y%m%d)"
          IMAGE_SHA_TAG="${{ env.REGISTRY }}/${{ env.IMAGE_REPOSITORY }}:${DATE_TAG}-${COMMIT_ID}"
          IMAGE_LATEST_TAG="${{ env.REGISTRY }}/${{ env.IMAGE_REPOSITORY }}:latest"

          echo "commit_id=${COMMIT_ID}" >> "${GITHUB_OUTPUT}"
          echo "image_sha_tag=${IMAGE_SHA_TAG}" >> "${GITHUB_OUTPUT}"
          echo "image_latest_tag=${IMAGE_LATEST_TAG}" >> "${GITHUB_OUTPUT}"

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ steps.vars.outputs.image_sha_tag }}
            ${{ steps.vars.outputs.image_latest_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Setup Nomad CLI
        uses: hashicorp/setup-nomad@main
        with:
          version: "1.11.2"

      - name: Deploy job to Nomad
        env:
          NOMAD_ADDR: ${{ secrets.NOMAD_ADDR }}
          NOMAD_TOKEN: ${{ secrets.NOMAD_TOKEN }}
          NOMAD_NAMESPACE: default
          NOMAD_VAR_image: ${{ steps.vars.outputs.image_sha_tag }}
          NOMAD_VAR_commit_id: ${{ steps.vars.outputs.commit_id }}
        run: |
          set -euo pipefail
          echo "=== Nomad CLI Version ==="
          nomad version

          echo "=== Job Plan (Preview Changes) ==="
          nomad job plan -detach deployment.nomad || true

          echo "=== Deploy Job (Async Submit) ==="
          nomad job run -detach deployment.nomad
