name: Docker Publish And Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  # Registry host without protocol (for example: registry.9kfun.xyz)
  REGISTRY: registry.9kfun.xyz
  # Full repository path in registry (for example: myproject/walle)
  IMAGE_REPOSITORY: walle_app
  # Logical app name used in compose service and remote path
  APP_NAME: walle_app
  # Remote deploy root
  REMOTE_BASE_DIR: /opt/stacks/walle_app

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Prepare image metadata
        id: vars
        run: |
          set -euo pipefail
          COMMIT_ID="${GITHUB_SHA::7}"
          IMAGE_SHA_TAG="${{ env.REGISTRY }}/${{ env.IMAGE_REPOSITORY }}:${COMMIT_ID}"
          IMAGE_LATEST_TAG="${{ env.REGISTRY }}/${{ env.IMAGE_REPOSITORY }}:latest"
          REMOTE_APP_DIR="${{ env.REMOTE_BASE_DIR }}/${{ env.APP_NAME }}"
          REMOTE_DEPLOY_DIR="${REMOTE_APP_DIR}/${{ env.APP_NAME }}"
          REMOTE_COMPOSE_FILE="${REMOTE_DEPLOY_DIR}/compose-${COMMIT_ID}.yaml"

          echo "commit_id=${COMMIT_ID}" >> "${GITHUB_OUTPUT}"
          echo "image_sha_tag=${IMAGE_SHA_TAG}" >> "${GITHUB_OUTPUT}"
          echo "image_latest_tag=${IMAGE_LATEST_TAG}" >> "${GITHUB_OUTPUT}"
          echo "remote_app_dir=${REMOTE_APP_DIR}" >> "${GITHUB_OUTPUT}"
          echo "remote_deploy_dir=${REMOTE_DEPLOY_DIR}" >> "${GITHUB_OUTPUT}"
          echo "remote_compose_file=${REMOTE_COMPOSE_FILE}" >> "${GITHUB_OUTPUT}"

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ steps.vars.outputs.image_sha_tag }}
            ${{ steps.vars.outputs.image_latest_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Ensure deploy files exist
        run: |
          set -euo pipefail
          test -f compose.template.yaml
          test -f .env.prod

      - name: Render compose from template
        run: |
          set -euo pipefail
          sed \
            -e "s|__APP_NAME__|${{ env.APP_NAME }}|g" \
            -e "s|__IMAGE__|${{ steps.vars.outputs.image_sha_tag }}|g" \
            compose.template.yaml > compose.rendered.yaml

      - name: Prepare SSH key
        run: |
          set -euo pipefail
          mkdir -p "${HOME}/.ssh"
          chmod 700 "${HOME}/.ssh"
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > "${HOME}/.ssh/id_ed25519"
          chmod 600 "${HOME}/.ssh/id_ed25519"
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> "${HOME}/.ssh/known_hosts"
          chmod 644 "${HOME}/.ssh/known_hosts"

      - name: Upload compose and env to remote host
        run: |
          set -eEuo pipefail
          trap 'echo "Upload step failed, exiting." >&2' ERR
          REMOTE="${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}"
          ssh "${REMOTE}" "if [ ! -d '${{ steps.vars.outputs.remote_deploy_dir }}' ]; then sudo mkdir -p '${{ steps.vars.outputs.remote_deploy_dir }}' && sudo chown ubuntu:ubuntu '${{ steps.vars.outputs.remote_deploy_dir }}'; fi" && \
          scp compose.rendered.yaml "${REMOTE}:${{ steps.vars.outputs.remote_compose_file }}" && \
          scp .env.prod "${REMOTE}:${{ steps.vars.outputs.remote_deploy_dir }}/.env.prod" && \
          ssh "${REMOTE}" "test -f '${{ steps.vars.outputs.remote_compose_file }}' && test -f '${{ steps.vars.outputs.remote_deploy_dir }}/.env.prod'"

      - name: Run docker compose on remote host
        run: |
          set -euo pipefail
          REMOTE="${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}"
          ssh "${REMOTE}" "
            set -euo pipefail
            docker login '${{ env.REGISTRY }}' -u '${{ secrets.REGISTRY_USERNAME }}' -p '${{ secrets.REGISTRY_PASSWORD }}'
            cd '${{ steps.vars.outputs.remote_deploy_dir }}'
            docker compose -f 'compose-${{ steps.vars.outputs.commit_id }}.yaml' --env-file '.env.prod' pull
            docker compose -f 'compose-${{ steps.vars.outputs.commit_id }}.yaml' --env-file '.env.prod' up -d --remove-orphans
          "
