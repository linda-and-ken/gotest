# =============================================================================
# 本 workflow：用仓库里的 Dockerfile 构建镜像，并推送到指定容器仓库（默认：自有 registry）
#
# 触发：Actions → 本 workflow → Run workflow
#
# GitHub 仓库需配置 Secrets（Settings → Secrets and variables → Actions）：
#   REGISTRY_USERNAME  你在 registry.9kfun.xyz 上的用户名（或 robot 账号名）
#   REGISTRY_PASSWORD  密码或访问令牌（勿用明文密码提交到仓库）
#
# 镜像完整名：REGISTRY/IMAGE_REPOSITORY（见下方 env），例如：
#   registry.9kfun.xyz/myproject/gotest:latest
#
# 若仍要推 Docker Hub：把 REGISTRY 改为 docker.io，IMAGE_REPOSITORY 改为
#   <你的 Hub 用户名>/gotest，并用 Hub 的账号密码填 REGISTRY_* 即可。
# =============================================================================

name: Build and Push Container Image

on:
  workflow_dispatch:

env:
  # 不要带 https://；Docker 客户端会走 HTTPS
  REGISTRY: registry.9kfun.xyz
  # registry 主机后面的路径：一般为「项目/仓库名」或「命名空间/仓库名」，须与控制台里一致
  # 只有一层时也可写成 gotest（视你方 registry 是否允许单段名）
  IMAGE_REPOSITORY: xxx

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_REPOSITORY }}
          tags: |
            type=raw,value=latest,enable=${{ github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' }}
            type=sha,prefix=,format=short

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

